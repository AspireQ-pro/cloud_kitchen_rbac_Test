# Application Configuration
spring.application.name=cloud-kitchen-rbac-service
server.port=${PORT:8081}
# Development: Show error details
server.error.include-stacktrace=on_param
server.error.include-message=always
server.error.include-binding-errors=always

# Database - Production optimized
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://Localhost:5432/cloud_kitchen_rbac?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:aspire123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA - PostgreSQL optimized
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT - Production ready secrets (minimum 256 bits)
app.jwt.secret=${JWT_SECRET:2M7w1SiV5XDAXEmVqg9gZWCXfF50l11FqJR2aSC1a8K9mN3pQ7rT2uV8wX1yZ4bC6dE9fG2hJ5kL8mN1oP4qR7sT3uV6wX9yZ2}
app.jwt.access-valid-seconds=${JWT_ACCESS_EXPIRY:1800}
app.jwt.refresh-valid-seconds=${JWT_REFRESH_EXPIRY:259200}
app.jwt.issuer=cloud-kitchen-rbac

# CORS - Production: Restrict to specific domains
app.cors.allowed-origins=${CORS_ORIGINS:https://yourdomain.com,https://admin.yourdomain.com}

# Swagger Configuration - Production (disabled by default)
springdoc.api-docs.enabled=${SWAGGER_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=${SWAGGER_TRY_IT_OUT:true}
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.filter=true

# Spring Security - Disable default password generation
spring.security.user.password=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Logging - Production
logging.level.com.cloudkitchen.rbac=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.AUDIT=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n