# Application Configuration
spring.application.name=cloud-kitchen-rbac-service
server.port=${PORT:8081}
# Development: Show error details
server.error.include-stacktrace=on_param
server.error.include-message=always
server.error.include-binding-errors=always

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cloud_kitchen_rbac}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Yogesh@1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20

# JWT
app.jwt.secret=${JWT_SECRET:q2M7w1SiV5XDAXEmVqg9gZWCXfF50l11FqJR2aSC1a8=}
app.jwt.access-valid-seconds=${JWT_ACCESS_EXPIRY:3600}
app.jwt.refresh-valid-seconds=${JWT_REFRESH_EXPIRY:604800}
app.jwt.issuer=cloud-kitchen-rbac

# CORS - Development: Allow all origins
app.cors.allowed-origins=${CORS_ORIGINS:*}

# Swagger Configuration - Development
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.filter=true

# Spring Security - Disable default password generation
spring.security.user.password=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Logging - Development
logging.level.com.cloudkitchen.rbac=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.AUDIT=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n