version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rbac-postgres
    environment:
      POSTGRES_DB: cloud_kitchen_rbac
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aspire123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rbac-service:
    build: .
    container_name: rbac-service
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/cloud_kitchen_rbac
      DB_USERNAME: postgres
      DB_PASSWORD: aspire123
      JWT_SECRET: q2M7w1SiV5XDAXEmVqg9gZWCXfF50l11FqJR2aSC1a8=
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: