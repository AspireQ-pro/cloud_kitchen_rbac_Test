# Application Configuration
spring.application.name=cloud-kitchen-rbac-service
server.port=${PORT:8081}
# Development: Show error details
server.error.include-stacktrace=on_param
server.error.include-message=always
server.error.include-binding-errors=always

# Database - EC2 Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://65.0.92.207:5432/cloud_kitchen_rbac}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:aspire123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Timezone configuration - Use UTC for consistency
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA - PostgreSQL optimized
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT - Production ready secrets (minimum 256 bits)
app.jwt.secret=${JWT_SECRET:2M7w1SiV5XDAXEmVqg9gZWCXfF50l11FqJR2aSC1a8K9mN3pQ7rT2uV8wX1yZ4bC6dE9fG2hJ5kL8mN1oP4qR7sT3uV6wX9yZ2}
app.jwt.access-valid-seconds=${JWT_ACCESS_EXPIRY:1800}
app.jwt.refresh-valid-seconds=${JWT_REFRESH_EXPIRY:259200}
app.jwt.issuer=cloud-kitchen-rbac

# CORS - Allow all origins for testing
app.cors.allowed-origins=*

# Swagger Configuration - Development (enabled by default)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Spring Security - Disable default password generation
spring.security.user.password=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Logging - Debug mode
logging.level.com.cloudkitchen.rbac=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG
logging.level.AUDIT=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n