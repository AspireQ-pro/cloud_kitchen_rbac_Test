# Application Configuration
# Production Profile (default)
# For development: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# For testing: mvn spring-boot:run -Dspring-boot.run.profiles=test
spring.application.name=cloud-kitchen-rbac-service
server.port=${PORT:8082}
server.address=0.0.0.0

# Timezone Configuration - India Standard Time (EC2 Compatible)
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata
# JVM timezone for EC2
spring.jpa.properties.hibernate.time_zone=Asia/Kolkata
# Development: Show error details for testing
server.error.include-stacktrace=on_param
server.error.include-message=always
server.error.include-binding-errors=always

# Database - PostgreSQL Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://65.0.92.207:5432/cloud_kitchen_rbac}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:aspire123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - PostgreSQL optimized
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT - Production ready secrets (minimum 256 bits)
app.jwt.secret=${JWT_SECRET:2M7w1SiV5XDAXEmVqg9gZWCXfF50l11FqJR2aSC1a8K9mN3pQ7rT2uV8wX1yZ4bC6dE9fG2hJ5kL8mN1oP4qR7sT3uV6wX9yZ2}
app.jwt.access-valid-seconds=${JWT_ACCESS_EXPIRY:604800}
app.jwt.refresh-valid-seconds=${JWT_REFRESH_EXPIRY:259200}
app.jwt.issuer=cloud-kitchen-rbac

# CORS - Allow all origins for testing
app.cors.allowed-origins=*

# Swagger Configuration - Enabled for testing
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Spring Security - Disable default password generation
spring.security.user.password=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Logging - Production ready
logging.level.com.cloudkitchen.rbac=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.transaction=WARN
logging.level.AUDIT=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS}{Asia/Kolkata} [%thread] %-5level %logger{36} - %msg%n

# Data Initialization - Enable for testing/development
app.data.initialize=${DATA_INITIALIZE:false}

