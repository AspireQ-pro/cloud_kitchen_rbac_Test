server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${PORT:8081}

# --- Database (Environment Variables) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cloud_kitchen_rbac}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
# POSTGRES_USER: postgres
#       POSTGRES_PASSWORD: aspire123
#       POSTGRES_DB: cloud_kitchen_rbac

# --- Connection Pool Optimization ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- SQL Initialization ---
spring.sql.init.mode=never

# --- JWT (Environment Variables) ---
app.jwt.secret=${JWT_SECRET:q2M7w1SiV5XDAXEmVqg9gZWCXfF50l11FqJR2aSC1a8=}
app.jwt.access-valid-seconds=${JWT_ACCESS_EXPIRY:86400}
app.jwt.refresh-valid-seconds=${JWT_REFRESH_EXPIRY:604800}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Swagger / Springdoc (Environment Variables) ---
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:true}
springdoc.swagger-ui.path=${SWAGGER_PATH:/swagger-ui.html}
springdoc.swagger-ui.url=${SWAGGER_SERVER_URL:}
server.forward-headers-strategy=framework

