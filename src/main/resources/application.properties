# Application Configuration
spring.application.name=cloud-kitchen-rbac-service
server.port=${PORT:8082}
server.error.include-stacktrace=never
server.error.include-message=never

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cloud_kitchen_rbac}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Yogesh@1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20

# JWT
app.jwt.secret=${JWT_SECRET:q2M7w1SiV5XDAXEmVqg9gZWCXfF50l11FqJR2aSC1a8=}
app.jwt.access-valid-seconds=${JWT_ACCESS_EXPIRY:3600}
app.jwt.refresh-valid-seconds=${JWT_REFRESH_EXPIRY:604800}
app.jwt.issuer=cloud-kitchen-rbac

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

# OTP
app.otp.length=4
app.otp.expiry-minutes=5
app.otp.max-attempts=3

# Security
app.security.password.min-length=8
app.security.max-login-attempts=5

# Logging
logging.level.com.cloudkitchen.rbac=INFO
logging.level.org.springframework.security=WARN
logging.level.AUDIT=INFO