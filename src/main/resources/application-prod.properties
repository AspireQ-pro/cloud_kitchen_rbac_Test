server.address=0.0.0.0
server.port=${PORT:8081}

# --- Database (Environment Variables) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cloud_kitchen_rbac}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Connection Pool ---
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- SQL Initialization ---
spring.sql.init.mode=never

# --- JWT (Environment Variables) ---
app.jwt.secret=${JWT_SECRET}
app.jwt.access-valid-seconds=${JWT_ACCESS_EXPIRY:3600}
app.jwt.refresh-valid-seconds=${JWT_REFRESH_EXPIRY:86400}
app.jwt.expiration=${JWT_EXPIRATION:3600000}

# --- Swagger (Disabled in Production) ---
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# --- Logging ---
logging.level.com.cloudkitchen=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# --- Health Check ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized